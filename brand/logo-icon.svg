<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <clipPath id="clip"><rect width="128" height="128" rx="20"/></clipPath>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" rx="0.5" fill="#111111"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#00FF41" flood-opacity="0.35" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#clip)">
    <!-- Black background + grid of small boxes -->
    <rect width="128" height="128" fill="#080808"/>
    <rect width="128" height="128" fill="url(#grid)"/>

    <!-- Shield outline cells (dim green) -->
    <g fill="#1A3A1A">
      <rect x="48" y="8" width="7" height="7"/><rect x="56" y="8" width="7" height="7"/>
      <rect x="64" y="8" width="7" height="7"/><rect x="72" y="8" width="7" height="7"/>
      <rect x="32" y="16" width="7" height="7"/><rect x="40" y="16" width="7" height="7"/>
      <rect x="48" y="16" width="7" height="7"/><rect x="56" y="16" width="7" height="7"/>
      <rect x="64" y="16" width="7" height="7"/><rect x="72" y="16" width="7" height="7"/>
      <rect x="80" y="16" width="7" height="7"/><rect x="88" y="16" width="7" height="7"/>
      <rect x="16" y="24" width="7" height="7"/><rect x="104" y="24" width="7" height="7"/>
      <rect x="16" y="32" width="7" height="7"/><rect x="104" y="32" width="7" height="7"/>
      <rect x="16" y="40" width="7" height="7"/><rect x="104" y="40" width="7" height="7"/>
      <rect x="16" y="48" width="7" height="7"/><rect x="104" y="48" width="7" height="7"/>
      <rect x="16" y="56" width="7" height="7"/><rect x="104" y="56" width="7" height="7"/>
      <rect x="16" y="64" width="7" height="7"/><rect x="104" y="64" width="7" height="7"/>
      <rect x="16" y="72" width="7" height="7"/><rect x="104" y="72" width="7" height="7"/>
      <rect x="16" y="80" width="7" height="7"/><rect x="104" y="80" width="7" height="7"/>
      <rect x="16" y="88" width="7" height="7"/><rect x="104" y="88" width="7" height="7"/>
      <rect x="32" y="96" width="7" height="7"/><rect x="40" y="96" width="7" height="7"/>
      <rect x="80" y="96" width="7" height="7"/><rect x="88" y="96" width="7" height="7"/>
      <rect x="48" y="104" width="7" height="7"/><rect x="56" y="104" width="7" height="7"/>
      <rect x="64" y="104" width="7" height="7"/><rect x="72" y="104" width="7" height="7"/>
      <rect x="56" y="112" width="7" height="7"/><rect x="64" y="112" width="7" height="7"/>
    </g>

    <!-- Digital rain cells (subtle green tint in margins) -->
    <g fill="#112211">
      <rect x="0" y="8" width="7" height="7"/><rect x="0" y="32" width="7" height="7"/>
      <rect x="0" y="56" width="7" height="7"/><rect x="0" y="80" width="7" height="7"/>
      <rect x="0" y="112" width="7" height="7"/>
      <rect x="8" y="16" width="7" height="7"/><rect x="8" y="48" width="7" height="7"/>
      <rect x="8" y="72" width="7" height="7"/><rect x="8" y="104" width="7" height="7"/>
      <rect x="112" y="0" width="7" height="7"/><rect x="112" y="24" width="7" height="7"/>
      <rect x="112" y="48" width="7" height="7"/><rect x="112" y="80" width="7" height="7"/>
      <rect x="112" y="112" width="7" height="7"/>
      <rect x="120" y="8" width="7" height="7"/><rect x="120" y="40" width="7" height="7"/>
      <rect x="120" y="64" width="7" height="7"/><rect x="120" y="96" width="7" height="7"/>
    </g>
    <g fill="#1A3A1A" opacity="0.7">
      <rect x="8" y="0" width="7" height="7"/><rect x="0" y="48" width="7" height="7"/>
      <rect x="8" y="88" width="7" height="7"/>
      <rect x="120" y="24" width="7" height="7"/><rect x="112" y="64" width="7" height="7"/>
      <rect x="120" y="104" width="7" height="7"/>
    </g>

    <!-- M letterform — pixel blocks with glow -->
    <g fill="#00FF41" filter="url(#glow)">
      <!-- Row 3 (y=24): shoulders -->
      <rect x="24" y="24" width="7" height="7"/><rect x="32" y="24" width="7" height="7"/>
      <rect x="40" y="24" width="7" height="7"/>
      <rect x="80" y="24" width="7" height="7"/>
      <rect x="88" y="24" width="7" height="7"/><rect x="96" y="24" width="7" height="7"/>
      <!-- Row 4 (y=32): shoulders continue -->
      <rect x="24" y="32" width="7" height="7"/><rect x="32" y="32" width="7" height="7"/>
      <rect x="40" y="32" width="7" height="7"/>
      <rect x="80" y="32" width="7" height="7"/>
      <rect x="88" y="32" width="7" height="7"/><rect x="96" y="32" width="7" height="7"/>
      <!-- Row 5 (y=40): diagonal step 1 -->
      <rect x="24" y="40" width="7" height="7"/><rect x="32" y="40" width="7" height="7"/>
      <rect x="48" y="40" width="7" height="7"/>
      <rect x="72" y="40" width="7" height="7"/>
      <rect x="88" y="40" width="7" height="7"/><rect x="96" y="40" width="7" height="7"/>
      <!-- Row 6 (y=48): diagonal step 2 -->
      <rect x="24" y="48" width="7" height="7"/><rect x="32" y="48" width="7" height="7"/>
      <rect x="56" y="48" width="7" height="7"/>
      <rect x="64" y="48" width="7" height="7"/>
      <rect x="88" y="48" width="7" height="7"/><rect x="96" y="48" width="7" height="7"/>
      <!-- Row 7 (y=56): V bottom -->
      <rect x="24" y="56" width="7" height="7"/><rect x="32" y="56" width="7" height="7"/>
      <rect x="56" y="56" width="7" height="7"/><rect x="64" y="56" width="7" height="7"/>
      <rect x="88" y="56" width="7" height="7"/><rect x="96" y="56" width="7" height="7"/>
      <!-- Rows 8-12 (y=64-96): legs -->
      <rect x="24" y="64" width="7" height="7"/><rect x="32" y="64" width="7" height="7"/>
      <rect x="88" y="64" width="7" height="7"/><rect x="96" y="64" width="7" height="7"/>
      <rect x="24" y="72" width="7" height="7"/><rect x="32" y="72" width="7" height="7"/>
      <rect x="88" y="72" width="7" height="7"/><rect x="96" y="72" width="7" height="7"/>
      <rect x="24" y="80" width="7" height="7"/><rect x="32" y="80" width="7" height="7"/>
      <rect x="88" y="80" width="7" height="7"/><rect x="96" y="80" width="7" height="7"/>
      <rect x="24" y="88" width="7" height="7"/><rect x="32" y="88" width="7" height="7"/>
      <rect x="88" y="88" width="7" height="7"/><rect x="96" y="88" width="7" height="7"/>
      <rect x="24" y="96" width="7" height="7"/><rect x="32" y="96" width="7" height="7"/>
      <rect x="88" y="96" width="7" height="7"/><rect x="96" y="96" width="7" height="7"/>
    </g>
  </g>
</svg>
