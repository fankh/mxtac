# ──────────────────────────────────────────────────
# Scheduler Reverse Proxy — path-based multi-project
# Port 13000 → /mxtac (MxTac)  and  /kyra (KYRA MDR)
#
# SECURITY: Bound to 127.0.0.1 only — not reachable
# from the network. For remote access, use SSH tunnel:
#   ssh -L 13000:localhost:13000 user@host
# ──────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;

upstream mxtac_frontend {
    server 127.0.0.1:13001;
}

upstream mxtac_backend {
    server 127.0.0.1:13002;
}

upstream kyra_frontend {
    server 127.0.0.1:13004;
}

upstream kyra_backend {
    server 127.0.0.1:13003;
}

server {
    listen 127.0.0.1:13000;
    server_name localhost;

    # Hide nginx version
    server_tokens off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Landing page (project selector) ──
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Scheduler Hub</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0a0a0a; color:#e5e5e5; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .hub { display:flex; gap:2rem; }
    .card { background:#1a1a2e; border:1px solid #2a2a4a; border-radius:12px; padding:2.5rem; width:320px; text-decoration:none; color:inherit; transition:all .2s; }
    .card:hover { border-color:#6366f1; transform:translateY(-4px); box-shadow:0 8px 30px rgba(99,102,241,.15); }
    .card h2 { font-size:1.4rem; margin-bottom:.5rem; }
    .card .port { color:#6366f1; font-size:.85rem; font-family:monospace; }
    .card p { color:#888; margin-top:.75rem; font-size:.9rem; line-height:1.5; }
    .card .status { margin-top:1rem; padding:.3rem .7rem; background:#1a2e1a; color:#4ade80; border-radius:6px; display:inline-block; font-size:.8rem; }
    h1 { text-align:center; margin-bottom:2rem; font-size:1.8rem; }
    .wrap { text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AI Scheduler Hub</h1>
    <div class="hub">
      <a href="/mxtac/" class="card">
        <h2>MxTac</h2>
        <span class="port">:13002</span>
        <p>MITRE ATT&CK security platform. Sigma detection, OSS integrations.</p>
        <span class="status">Backend :13002 / Frontend :13001</span>
      </a>
      <a href="/kyra/" class="card">
        <h2>KYRA MDR</h2>
        <span class="port">:13003</span>
        <p>Enterprise MDR SaaS. Java 21, Spring Boot, Rust collector, Next.js portal.</p>
        <span class="status">Backend :13003 / Frontend :13004</span>
      </a>
    </div>
  </div>
</body>
</html>';
    }

    # ── MxTac: backend API ──
    location /mxtac/api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://mxtac_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }

    # ── MxTac: auth (stricter rate limit) ──
    location /mxtac/api/auth/ {
        limit_req zone=auth_zone burst=3 nodelay;
        proxy_pass http://mxtac_backend/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── MxTac: backend health ──
    location = /mxtac/health {
        proxy_pass http://mxtac_backend/health;
    }

    # ── MxTac: SSE events ──
    location /mxtac/api/events {
        proxy_pass http://mxtac_backend/api/events;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── MxTac: frontend (pass full URI — Next.js basePath handles /mxtac prefix) ──
    location /mxtac {
        proxy_pass http://mxtac_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── KYRA: backend API ──
    location /kyra/api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://kyra_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }

    # ── KYRA: auth (stricter rate limit) ──
    location /kyra/api/auth/ {
        limit_req zone=auth_zone burst=3 nodelay;
        proxy_pass http://kyra_backend/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── KYRA: backend health ──
    location = /kyra/health {
        proxy_pass http://kyra_backend/health;
    }

    # ── KYRA: SSE events ──
    location /kyra/api/events {
        proxy_pass http://kyra_backend/api/events;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── KYRA: frontend (pass full URI — Next.js basePath handles /kyra prefix) ──
    location /kyra {
        proxy_pass http://kyra_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
