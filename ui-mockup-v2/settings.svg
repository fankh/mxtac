  <text x="72" y="895" font-size="9" fill="#A0AABB">KYRA MDR v1.0  ·  Account: j.smith@company.com  ·  Role: SOC Analyst</text>
  <circle cx="1346" cy="891" r="3" fill="#2E7D32"/>
  <text x="1354" y="895" font-size="9" fill="#2E7D32">Operational</text>
