  <rect x="704" y="130" width="44" height="44" rx="10" fill="#EBF5EB"/>
  <text x="726" y="157" text-anchor="middle" font-size="20" fill="#2E7D32">✓</text>
  <text x="704" y="194" font-size="13" fill="#1C2D40" font-weight="600">Compliance Audit</text>
