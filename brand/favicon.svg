<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0A0A0A"/>
  <!-- Subtle rain -->
  <g opacity="0.15" fill="#00FF41" font-family="monospace" font-size="3">
    <text x="3" y="6">1</text><text x="3" y="11">0</text><text x="3" y="22">1</text><text x="3" y="27">0</text>
    <text x="27" y="8">0</text><text x="27" y="13">1</text><text x="27" y="20">0</text><text x="27" y="25">1</text>
  </g>
  <path d="M8 24 V12 L16 18 L24 12 V24"
        fill="none" stroke="#00FF41" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
</svg>
