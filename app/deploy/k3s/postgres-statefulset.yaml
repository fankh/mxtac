apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mxtac-postgres
  namespace: mxtac
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: mxtac
    app.kubernetes.io/component: database
spec:
  serviceName: mxtac-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: mxtac
        app.kubernetes.io/component: database
    spec:
      terminationGracePeriodSeconds: 60
      # postgres:alpine runs as UID 70 (postgres user)
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: mxtac
            - name: POSTGRES_DB
              value: mxtac
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mxtac-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mxtac
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mxtac
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-run
              mountPath: /var/run/postgresql
            - name: postgres-tmp
              mountPath: /tmp
      volumes:
        - name: postgres-run
          emptyDir: {}
        - name: postgres-tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mxtac-postgres
  namespace: mxtac
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: mxtac
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None   # Headless for StatefulSet DNS
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
