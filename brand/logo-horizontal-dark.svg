<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64">
  <defs>
    <clipPath id="clip"><rect width="64" height="64" rx="10"/></clipPath>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" rx="0.5" fill="#111111"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/>
      <feFlood flood-color="#00FF41" flood-opacity="0.3" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#00FF41" flood-opacity="0.25" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon 64x64 pixel grid -->
  <g clip-path="url(#clip)">
    <rect width="64" height="64" fill="#080808"/>
    <rect width="64" height="64" fill="url(#grid)"/>
    <rect x="1" y="1" width="62" height="62" rx="9" fill="none" stroke="#00FF41" stroke-width="0.5" opacity="0.2"/>
    <g fill="#112211">
      <rect x="0" y="8" width="7" height="7"/><rect x="0" y="32" width="7" height="7"/>
      <rect x="0" y="56" width="7" height="7"/>
      <rect x="56" y="0" width="7" height="7"/><rect x="56" y="24" width="7" height="7"/>
      <rect x="56" y="48" width="7" height="7"/>
    </g>
    <g fill="#1A3A1A">
      <rect x="24" y="0" width="7" height="7"/><rect x="32" y="0" width="7" height="7"/>
      <rect x="8" y="56" width="7" height="7"/><rect x="48" y="56" width="7" height="7"/>
    </g>
    <g fill="#00FF41" filter="url(#glow)">
      <rect x="8" y="8" width="7" height="7"/><rect x="16" y="8" width="7" height="7"/>
      <rect x="40" y="8" width="7" height="7"/><rect x="48" y="8" width="7" height="7"/>
      <rect x="8" y="16" width="7" height="7"/><rect x="16" y="16" width="7" height="7"/>
      <rect x="24" y="16" width="7" height="7"/><rect x="32" y="16" width="7" height="7"/>
      <rect x="40" y="16" width="7" height="7"/><rect x="48" y="16" width="7" height="7"/>
      <rect x="8" y="24" width="7" height="7"/><rect x="48" y="24" width="7" height="7"/>
      <rect x="8" y="32" width="7" height="7"/><rect x="48" y="32" width="7" height="7"/>
      <rect x="8" y="40" width="7" height="7"/><rect x="48" y="40" width="7" height="7"/>
      <rect x="8" y="48" width="7" height="7"/><rect x="48" y="48" width="7" height="7"/>
    </g>
  </g>
  <!-- Wordmark: neon green -->
  <text x="80" y="30" font-family="'Courier New', 'Consolas', monospace"
        font-size="28" font-weight="700" fill="#00FF41" letter-spacing="1"
        filter="url(#textGlow)">MxTac</text>
  <text x="80" y="48" font-family="'Courier New', 'Consolas', monospace"
        font-size="9" font-weight="500" fill="rgba(0,255,65,0.45)" letter-spacing="3">SECURITY PLATFORM</text>
</svg>
