         - Under "Added", list the major components: detection engine, agent scheduler, frontend dashboard
         - Keep it concise (under 30 lines)

      3. Create ENV-REFERENCE.md at repo root:
         - Document every environment variable found across all components
         - Group by component (backend, frontend, agent-scheduler, etc.)
         - For each var: name, description, default value, required/optional
         - Use a markdown table format

      Acceptance criteria:
      - CHANGELOG.md exists at repo root in Keep a Changelog format
      - ENV-REFERENCE.md documents every env var in the project grouped by component
    working_directory: /home/khchoi/development/new-research/mitre-attack/mxtac
    target_files: ["CHANGELOG.md", "ENV-REFERENCE.md"]
    acceptance_criteria: "CHANGELOG.md and ENV-REFERENCE.md exist and are comprehensive"
    max_retries: 3

