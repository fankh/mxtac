##
## MxTac -- Docker Swarm Stack
##
## Deploy:
##   docker stack deploy -c docker-stack.yml mxtac
##
## Prerequisites:
##   - Docker Swarm initialised (docker swarm init)
##   - Secrets created:
##       echo "change-me" | docker secret create mxtac_secret_key -
##       echo "change-me" | docker secret create mxtac_pg_password -
##
## Scale the backend:
##   docker service scale mxtac_backend=5
##

version: "3.9"

services:

  # ── Backend API (3 replicas) ─────────────────────────────────────────────────
  backend:
    image: mxtac/backend:latest
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://mxtac:POSTGRES_PASSWORD@postgres:5432/mxtac
      - VALKEY_URL=redis://valkey:6379/0
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - QUEUE_BACKEND=redis
      - CORS_ORIGINS=["https://mxtac.local"]
    secrets:
      - mxtac_secret_key
      - mxtac_pg_password
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mxtac-net

  # ── Frontend (Nginx serving static build) ────────────────────────────────────
  frontend:
    image: mxtac/frontend:latest
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
    ports:
      - "80:80"
    networks:
      - mxtac-net

  # ── Valkey (Redis-compatible, BSD-licensed) ──────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mxtac-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mxtac
      POSTGRES_PASSWORD_FILE: /run/secrets/mxtac_pg_password
      POSTGRES_DB: mxtac
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1G
    secrets:
      - mxtac_pg_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mxtac"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mxtac-net

  # ── OpenSearch ───────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    environment:
      - cluster.name=mxtac-cluster
      - node.name=mxtac-node-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 1G
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - mxtac-net

networks:
  mxtac-net:
    driver: overlay
    attachable: true

volumes:
  valkey_data:
  postgres_data:
  opensearch_data:

secrets:
  mxtac_secret_key:
    external: true
  mxtac_pg_password:
    external: true
