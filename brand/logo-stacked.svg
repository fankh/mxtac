<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 168" width="128" height="168">
  <defs>
    <clipPath id="clip"><rect x="16" width="96" height="96" rx="16"/></clipPath>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" rx="0.5" fill="#111111"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#00FF41" flood-opacity="0.35" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feFlood flood-color="#00FF41" flood-opacity="0.25" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon 96x96 at x=16, pixel grid 12x12 -->
  <g clip-path="url(#clip)">
    <rect x="16" width="96" height="96" fill="#080808"/>
    <rect x="16" width="96" height="96" fill="url(#grid)"/>
    <!-- Shield cells -->
    <g fill="#1A3A1A">
      <rect x="48" y="0" width="7" height="7"/><rect x="56" y="0" width="7" height="7"/>
      <rect x="64" y="0" width="7" height="7"/><rect x="72" y="0" width="7" height="7"/>
      <rect x="32" y="8" width="7" height="7"/><rect x="40" y="8" width="7" height="7"/>
      <rect x="80" y="8" width="7" height="7"/><rect x="88" y="8" width="7" height="7"/>
      <rect x="24" y="16" width="7" height="7"/><rect x="96" y="16" width="7" height="7"/>
      <rect x="24" y="24" width="7" height="7"/><rect x="96" y="24" width="7" height="7"/>
      <rect x="24" y="32" width="7" height="7"/><rect x="96" y="32" width="7" height="7"/>
      <rect x="24" y="40" width="7" height="7"/><rect x="96" y="40" width="7" height="7"/>
      <rect x="24" y="48" width="7" height="7"/><rect x="96" y="48" width="7" height="7"/>
      <rect x="24" y="56" width="7" height="7"/><rect x="96" y="56" width="7" height="7"/>
      <rect x="24" y="64" width="7" height="7"/><rect x="96" y="64" width="7" height="7"/>
      <rect x="32" y="72" width="7" height="7"/><rect x="88" y="72" width="7" height="7"/>
      <rect x="40" y="80" width="7" height="7"/><rect x="80" y="80" width="7" height="7"/>
      <rect x="56" y="88" width="7" height="7"/><rect x="64" y="88" width="7" height="7"/>
    </g>
    <!-- Rain cells -->
    <g fill="#112211">
      <rect x="16" y="0" width="7" height="7"/><rect x="16" y="24" width="7" height="7"/>
      <rect x="16" y="48" width="7" height="7"/><rect x="16" y="72" width="7" height="7"/>
      <rect x="104" y="8" width="7" height="7"/><rect x="104" y="32" width="7" height="7"/>
      <rect x="104" y="56" width="7" height="7"/><rect x="104" y="80" width="7" height="7"/>
    </g>
    <!-- M pixel blocks -->
    <g fill="#00FF41" filter="url(#glow)">
      <!-- Top with shoulders -->
      <rect x="32" y="16" width="7" height="7"/><rect x="40" y="16" width="7" height="7"/>
      <rect x="48" y="16" width="7" height="7"/>
      <rect x="72" y="16" width="7" height="7"/>
      <rect x="80" y="16" width="7" height="7"/><rect x="88" y="16" width="7" height="7"/>
      <rect x="32" y="24" width="7" height="7"/><rect x="40" y="24" width="7" height="7"/>
      <rect x="48" y="24" width="7" height="7"/>
      <rect x="72" y="24" width="7" height="7"/>
      <rect x="80" y="24" width="7" height="7"/><rect x="88" y="24" width="7" height="7"/>
      <!-- Diagonal -->
      <rect x="32" y="32" width="7" height="7"/><rect x="40" y="32" width="7" height="7"/>
      <rect x="56" y="32" width="7" height="7"/>
      <rect x="64" y="32" width="7" height="7"/>
      <rect x="80" y="32" width="7" height="7"/><rect x="88" y="32" width="7" height="7"/>
      <!-- V bottom -->
      <rect x="32" y="40" width="7" height="7"/><rect x="40" y="40" width="7" height="7"/>
      <rect x="56" y="40" width="7" height="7"/><rect x="64" y="40" width="7" height="7"/>
      <rect x="80" y="40" width="7" height="7"/><rect x="88" y="40" width="7" height="7"/>
      <!-- Legs -->
      <rect x="32" y="48" width="7" height="7"/><rect x="40" y="48" width="7" height="7"/>
      <rect x="80" y="48" width="7" height="7"/><rect x="88" y="48" width="7" height="7"/>
      <rect x="32" y="56" width="7" height="7"/><rect x="40" y="56" width="7" height="7"/>
      <rect x="80" y="56" width="7" height="7"/><rect x="88" y="56" width="7" height="7"/>
      <rect x="32" y="64" width="7" height="7"/><rect x="40" y="64" width="7" height="7"/>
      <rect x="80" y="64" width="7" height="7"/><rect x="88" y="64" width="7" height="7"/>
      <rect x="32" y="72" width="7" height="7"/><rect x="40" y="72" width="7" height="7"/>
      <rect x="80" y="72" width="7" height="7"/><rect x="88" y="72" width="7" height="7"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="64" y="128" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace"
        font-size="28" font-weight="700" fill="#00FF41" letter-spacing="1"
        filter="url(#textGlow)">MxTac</text>
  <text x="64" y="148" text-anchor="middle" font-family="'Courier New', 'Consolas', monospace"
        font-size="8" font-weight="500" fill="rgba(0,255,65,0.45)" letter-spacing="2.5">SECURITY PLATFORM</text>
</svg>
