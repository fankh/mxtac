  <text x="1010" y="306" font-size="10" fill="#5A6B82" font-weight="500">Theme</text>
  <rect x="1010" y="312" width="280" height="32" rx="4" fill="#F4F6F8" stroke="#DDE3EB" stroke-width="1"/>
