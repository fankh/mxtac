  <text x="114" y="157" text-anchor="middle" font-size="20" fill="#0066CC">🛡</text>
  <text x="92" y="194" font-size="13" fill="#1C2D40" font-weight="600">Security Summary</text>
  <text x="92" y="212" font-size="11" fill="#A0AABB">Weekly overview of detections,</text>
