# MxTac Prometheus configuration
# Scrape targets: FastAPI backend instances exposing /metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files: []

scrape_configs:
  # ── MxTac Backend API ──────────────────────────────────────────────────────
  - job_name: "mxtac-backend"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "backend:8080"
        labels:
          service: mxtac-api
          environment: production

    # If running multiple replicas behind a load-balancer, use DNS-SD:
    # dns_sd_configs:
    #   - names: ["backend"]
    #     type: A
    #     port: 8000

  # ── Node exporter (optional host metrics) ──────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"
        labels:
          service: infrastructure

  # ── OpenSearch exporter (optional) ─────────────────────────────────────────
  - job_name: "opensearch-exporter"
    static_configs:
      - targets:
          - "opensearch-exporter:9114"
        labels:
          service: opensearch

  # ── PostgreSQL exporter (optional) ─────────────────────────────────────────
  - job_name: "postgres-exporter"
    static_configs:
      - targets:
          - "postgres-exporter:9187"
        labels:
          service: postgres
