apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mxtac-opensearch
  namespace: mxtac
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: mxtac
    app.kubernetes.io/component: search
spec:
  serviceName: mxtac-opensearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/part-of: mxtac
        app.kubernetes.io/component: search
    spec:
      terminationGracePeriodSeconds: 120
      # OpenSearch runs as UID 1000 (opensearch user)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # OpenSearch requires vm.max_map_count=262144 on the host.
        # This privileged init container sets it per-node. Alternatively,
        # set it cluster-wide via a DaemonSet or node configuration.
        - name: sysctl
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
        # Fix data directory ownership to match the opensearch UID
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /usr/share/opensearch/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.17.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
            - name: metrics
              containerPort: 9600
              protocol: TCP
          env:
            - name: cluster.name
              value: mxtac-cluster
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: discovery.type
              value: single-node
            # bootstrap.memory_lock is intentionally omitted: it requires
            # IPC_LOCK capability or privileged mode. The vm.max_map_count
            # init container (above) is sufficient for performance.
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 1536Mi
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
  volumeClaimTemplates:
    - metadata:
        name: opensearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mxtac-opensearch
  namespace: mxtac
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: mxtac
    app.kubernetes.io/component: search
spec:
  type: ClusterIP
  clusterIP: None   # Headless for StatefulSet DNS
  selector:
    app.kubernetes.io/name: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: http
      protocol: TCP
    - name: transport
      port: 9300
      targetPort: transport
      protocol: TCP
