<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" font-family="'Segoe UI', Inter, sans-serif">
  <defs>
    <filter id="card" x="-4%" y="-4%" width="108%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0000000D"/>
