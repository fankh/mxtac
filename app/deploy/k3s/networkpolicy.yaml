---
# Default-deny all ingress and egress within the namespace.
# Subsequent policies below open only the required traffic paths.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: mxtac
  labels:
    app.kubernetes.io/part-of: mxtac
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS egress from all pods (required for cluster DNS resolution).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: mxtac
  labels:
    app.kubernetes.io/part-of: mxtac
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Backend: accept ingress from the Traefik ingress controller (kube-system)
# and allow egress to postgres, valkey, and opensearch.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: mxtac
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: mxtac
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Traffic from Traefik ingress controller (k3s default; lives in kube-system)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # → PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - port: 5432
          protocol: TCP
    # → Valkey
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - port: 6379
          protocol: TCP
    # → OpenSearch
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opensearch
      ports:
        - port: 9200
          protocol: TCP
---
# Frontend: accept ingress from the ingress controller only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: mxtac
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: mxtac
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 80
          protocol: TCP
---
# PostgreSQL: accept ingress from backend only; no egress required.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-policy
  namespace: mxtac
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: mxtac
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
      ports:
        - port: 5432
          protocol: TCP
---
# Valkey: accept ingress from backend only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: valkey-policy
  namespace: mxtac
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: mxtac
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: valkey
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
      ports:
        - port: 6379
          protocol: TCP
---
# OpenSearch: accept ingress from backend only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: opensearch-policy
  namespace: mxtac
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: mxtac
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
      ports:
        - port: 9200
          protocol: TCP
        - port: 9300
          protocol: TCP
