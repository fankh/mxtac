  <text x="26" y="82" text-anchor="middle" font-size="15" fill="#A0AABB">⊞</text>
  <text x="26" y="128" text-anchor="middle" font-size="15" fill="#A0AABB">⚡</text>
  <text x="26" y="166" text-anchor="middle" font-size="15" fill="#A0AABB">⬡</text>
  <text x="26" y="208" text-anchor="middle" font-size="15" fill="#A0AABB">🖥</text>
  <text x="26" y="250" text-anchor="middle" font-size="15" fill="#A0AABB">⏱</text>
  <text x="26" y="292" text-anchor="middle" font-size="15" fill="#A0AABB">🔌</text>
  <!-- Reports active -->
