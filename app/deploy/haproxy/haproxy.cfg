#
# MxTac -- HAProxy configuration
#
# Features:
#   - Layer-7 HTTP load balancing for the backend API
#   - WebSocket upgrade support for /api/v1/ws/*
#   - Health checks via /ready endpoint
#   - Stats dashboard on :8404/stats
#
# Usage:
#   haproxy -f haproxy.cfg
#

global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect  5s
    timeout client  60s
    timeout server  60s
    timeout tunnel 3600s
    retries 3

# ── Stats dashboard ──────────────────────────────────────────────────────────

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST

# ── Frontend: public entry point ─────────────────────────────────────────────

frontend http_in
    bind *:80
    bind *:443 ssl crt /etc/haproxy/certs/mxtac.pem

    # Redirect HTTP to HTTPS (uncomment in production)
    # http-request redirect scheme https unless { ssl_fc }

    # Detect WebSocket upgrade
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_ws_path   path_beg /api/v1/ws

    # Route WebSocket traffic
    use_backend backend_ws if is_websocket is_ws_path

    # Route API traffic
    acl is_api path_beg /api/
    acl is_health path /health
    acl is_ready path /ready
    use_backend backend_api if is_api or is_health or is_ready

    # Everything else goes to the frontend static server
    default_backend frontend_static

# ── Backend API (HTTP) ───────────────────────────────────────────────────────

backend backend_api
    balance roundrobin
    option httpchk GET /ready
    http-check expect status 200

    # Sticky sessions not required for stateless API calls
    default-server inter 10s fall 3 rise 2

    server backend1 backend-1:8080 check
    server backend2 backend-2:8080 check
    server backend3 backend-3:8080 check

# ── Backend WebSocket ────────────────────────────────────────────────────────

backend backend_ws
    balance roundrobin
    option httpchk GET /ready
    http-check expect status 200

    # WebSocket connections are long-lived; no need for cookie affinity
    # because the DistributedConnectionManager fans out via Valkey pub/sub.
    timeout tunnel 3600s
    timeout server 3600s

    default-server inter 10s fall 3 rise 2

    server backend1 backend-1:8080 check
    server backend2 backend-2:8080 check
    server backend3 backend-3:8080 check

# ── Frontend static (Nginx) ─────────────────────────────────────────────────

backend frontend_static
    balance roundrobin
    server frontend1 frontend-1:80 check
    server frontend2 frontend-2:80 check
