apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mxtac-valkey
  namespace: mxtac
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: mxtac
    app.kubernetes.io/component: cache
spec:
  serviceName: mxtac-valkey
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
        app.kubernetes.io/part-of: mxtac
        app.kubernetes.io/component: cache
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          command:
            - valkey-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: valkey
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: valkey-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: valkey-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mxtac-valkey
  namespace: mxtac
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: mxtac
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  clusterIP: None   # Headless for StatefulSet DNS
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
      protocol: TCP
