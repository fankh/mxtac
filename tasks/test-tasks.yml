tasks:
  - task_id: test-1
    title: "[TEST] Create hello world file"
    category: test
    phase: test
    priority: 100
    prompt: |
      Create a file at /tmp/mxtac-test/hello.txt with the content "Hello from MxTac agent scheduler! Test passed."
      Then verify the file exists and print its contents.
    acceptance_criteria: "File /tmp/mxtac-test/hello.txt exists with correct content"
    max_retries: 1

  - task_id: test-2
    title: "[TEST] Read and summarize a file"
    category: test
    phase: test
    priority: 90
    prompt: |
      Read the file /home/khchoi/development/new-research/mitre-attack/mxtac/app/backend/pyproject.toml
      and provide a 3-line summary of the project: name, python version, and main dependencies.
    acceptance_criteria: "Summary includes project name, python version, and key dependencies"
    max_retries: 1

  - task_id: test-3
    title: "[TEST] Deliberate failure — missing file"
    category: test
    phase: test
    priority: 80
    prompt: |
      Read the file /nonexistent/path/does-not-exist.txt and print its contents.
      Do not create the file. Just try to read it. If it does not exist, exit with an error.
    acceptance_criteria: "This task should fail"
    max_retries: 1
