  - task_id: mxtac-39.2a
    title: "[P1] Project config files (TASK-0.5.2a)"
    category: documentation
    phase: "0.5"
    priority: 3
    prompt: |
      You are implementing features for MxTac, a MITRE ATT&CK security platform.

      Project root: /home/khchoi/development/new-research/mitre-attack/mxtac
      Task: TASK-0.5.2a — Project Configuration Files

      IMPORTANT: No changes to .github/ directory.

      Steps:
      1. Read these input files first:
         - 00-README.md

      2. Create .editorconfig at repo root with:
         - root = true
         - indent_style = space
         - indent_size = 2 for ts, tsx, js, json, yaml, yml, html, css
         - indent_size = 4 for py
         - end_of_line = lf
         - charset = utf-8
         - trim_trailing_whitespace = true
         - insert_final_newline = true

      3. Create app/frontend/.prettierrc with sensible defaults:
         - semi: true
         - singleQuote: true
         - trailingComma: "es5"
         - printWidth: 100
         - tabWidth: 2

      Acceptance criteria:
      - .editorconfig exists at repo root and enforces consistent formatting
      - app/frontend/.prettierrc exists with valid JSON
    working_directory: /home/khchoi/development/new-research/mitre-attack/mxtac
    target_files: [".editorconfig", "app/frontend/.prettierrc"]
    acceptance_criteria: ".editorconfig and .prettierrc exist with correct settings"
    max_retries: 3

  - task_id: mxtac-39.2b
    title: "[P1] CHANGELOG and ENV reference docs (TASK-0.5.2b)"
    category: documentation
    phase: "0.5"
    priority: 3
    prompt: |
      You are implementing features for MxTac, a MITRE ATT&CK security platform.

      Project root: /home/khchoi/development/new-research/mitre-attack/mxtac
