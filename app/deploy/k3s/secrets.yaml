# ============================================================
# MxTac Kubernetes Secrets — DO NOT COMMIT REAL VALUES
# ============================================================
# This file is a TEMPLATE only. Real secrets must be created
# imperatively using kubectl or sealed-secrets.
#
# Quick-start (copy-paste ready):
#
#   export POSTGRES_PASS=$(openssl rand -hex 32)
#   export SECRET_KEY=$(openssl rand -hex 64)
#   export DB_URL="postgresql+asyncpg://mxtac:${POSTGRES_PASS}@mxtac-postgres-0.mxtac-postgres.mxtac.svc.cluster.local:5432/mxtac"
#
#   kubectl create secret generic mxtac-secrets \
#     --namespace mxtac \
#     --from-literal=postgres-password="${POSTGRES_PASS}" \
#     --from-literal=secret-key="${SECRET_KEY}" \
#     --from-literal=database-url="${DB_URL}"
#
# For TLS (replace with your cert or use cert-manager):
#
#   kubectl create secret tls mxtac-tls \
#     --namespace mxtac \
#     --cert=path/to/tls.crt \
#     --key=path/to/tls.key
#
# Alternatively with cert-manager (recommended for production):
#
#   apiVersion: cert-manager.io/v1
#   kind: Certificate
#   metadata:
#     name: mxtac-tls
#     namespace: mxtac
#   spec:
#     secretName: mxtac-tls
#     issuerRef:
#       name: letsencrypt-prod
#       kind: ClusterIssuer
#     dnsNames:
#       - mxtac.local
# ============================================================
#
# Secret keys consumed by the manifests:
#
#   mxtac-secrets:
#     database-url       — full asyncpg connection string
#     secret-key         — JWT signing key (min 64 chars)
#     postgres-password  — PostgreSQL password (used by postgres StatefulSet)
#
#   mxtac-tls:
#     tls.crt            — TLS certificate (PEM)
#     tls.key            — TLS private key (PEM)
#
# NEVER store real values in this file or commit them to git.
