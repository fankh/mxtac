apiVersion: v1
kind: Service
metadata:
  name: mxtac-backend
  namespace: mxtac
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: mxtac
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
