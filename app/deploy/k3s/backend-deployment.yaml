apiVersion: apps/v1
kind: Deployment
metadata:
  name: mxtac-backend
  namespace: mxtac
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: mxtac
    app.kubernetes.io/component: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: mxtac
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: mxtac
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      # Spread replicas across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Run Alembic migrations before the backend starts.
      # This ensures schema is current before any replica begins serving traffic.
      # Alembic upgrade head is idempotent — safe to run from multiple replicas
      # concurrently (Alembic uses DB-level locking via the alembic_version table).
      initContainers:
        - name: migrate
          image: mxtac/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          workingDir: /app
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mxtac-secrets
                  key: database-url
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: backend
          image: mxtac/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # preStop delays SIGTERM by 10 s so the Kubernetes endpoints controller and
          # ingress controller have time to drain in-flight connections before the pod
          # exits. Combined with terminationGracePeriodSeconds: 30, the application
          # still has ≥ 20 s to finish any requests already in progress.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            # Sensitive: from Secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mxtac-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mxtac-secrets
                  key: secret-key
            # Non-sensitive: from ConfigMap
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: DEBUG
            - name: QUEUE_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: QUEUE_BACKEND
            - name: VALKEY_URL
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: VALKEY_URL
            - name: OPENSEARCH_HOST
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: OPENSEARCH_HOST
            - name: OPENSEARCH_PORT
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: OPENSEARCH_PORT
            - name: OPENSEARCH_USE_SSL
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: OPENSEARCH_USE_SSL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: CORS_ORIGINS
            - name: RATE_LIMIT_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: RATE_LIMIT_PER_MINUTE
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              valueFrom:
                configMapKeyRef:
                  name: mxtac-config
                  key: REFRESH_TOKEN_EXPIRE_DAYS
          # Writable tmp dir for uvicorn / potential temp files
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
