      IMPORTANT: No changes to .github/ directory.

      Steps:
      1. Read all .env.example files in the project to understand every environment variable.
         Search recursively: find all files named .env.example or .env.sample

      2. Create CHANGELOG.md at repo root using "Keep a Changelog" format:
         - Header: "# Changelog"
         - Format reference: https://keepachangelog.com/en/1.0.0/
