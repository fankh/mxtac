apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply resources in dependency order.
# kubectl apply -k deploy/k3s/
resources:
  # 1. Namespace must exist before anything else
  - namespace.yaml

  # 2. RBAC / identity
  - serviceaccount.yaml

  # 3. Non-sensitive configuration
  - configmap.yaml

  # 4. Stateful infrastructure (databases first — backend depends on them)
  - postgres-statefulset.yaml
  - valkey-statefulset.yaml
  - opensearch-statefulset.yaml

  # 5. Application workloads
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml

  # 6. Traffic routing
  - ingress.yaml

  # 7. Autoscaling & availability
  - hpa.yaml
  - pdb.yaml

  # 8. Network security (apply last — takes effect immediately on existing pods)
  - networkpolicy.yaml

  # NOTE: secrets.yaml is intentionally excluded — secrets are created imperatively.
  # See secrets.yaml for the kubectl commands.

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: mxtac
